<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kris Collage — 相片拼貼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,500;1,600&family=Noto+Serif+JP:wght@400;500&family=Montserrat:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #101014;
    --panel: #1a1a20;
    --panel2: #22222a;
    --text: #ececf0;
    --muted: #9a9aa5;
    --accent: #e8b04b;
    --border: #2e2e38;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 18px 24px 6px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
  header h1 em { font-family: "Playfair Display", serif; color: var(--accent); font-weight: 600; }
  header span { color: var(--muted); font-size: 12.5px; }
  header .ver {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 10px;
    letter-spacing: 0.5px;
  }
  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 340px;
    gap: 20px;
    padding: 14px 24px 40px;
    max-width: 1280px;
    margin: 0 auto;
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; padding: 12px 14px 40px; }
  }
  .stage {
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
  #preview {
    max-width: 100%;
    max-height: calc(100vh - 130px);
    border-radius: 6px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    touch-action: none;
    cursor: grab;
    background: #000;
  }
  .controls { display: flex; flex-direction: column; gap: 14px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .card h2 {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .row:last-child { margin-bottom: 0; }
  .row label { font-size: 13px; flex: 0 0 84px; color: var(--text); }
  .seg { display: flex; gap: 6px; flex-wrap: wrap; }
  .seg button {
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 7px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  .seg button.active { color: #111; background: var(--accent); border-color: var(--accent); font-weight: 600; }
  .uploads { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .uploads.three { grid-template-columns: 1fr 1fr 1fr; }
  .upl {
    position: relative;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    min-height: 66px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    overflow: hidden;
    background: var(--panel2);
    transition: border-color .15s;
  }
  .upl:hover { border-color: var(--accent); }
  .upl input { display: none; }
  .upl .lbl { font-size: 12.5px; color: var(--text); z-index: 2; text-shadow: 0 1px 4px rgba(0,0,0,.8); }
  .upl .hint { font-size: 10.5px; color: var(--muted); z-index: 2; text-shadow: 0 1px 4px rgba(0,0,0,.8); }
  .upl img.thumb {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; opacity: 0.55;
  }
  .upl.filled { border-style: solid; }
  input[type=text] {
    flex: 1;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 13.5px;
    min-width: 0;
  }
  input[type=text]:focus { outline: none; border-color: var(--accent); }
  input[type=range] { flex: 1; accent-color: var(--accent); min-width: 0; }
  .btns { display: flex; gap: 8px; }
  .btn {
    flex: 1;
    border: none;
    border-radius: 9px;
    padding: 11px 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn.primary { background: var(--accent); color: #16120a; }
  .btn.ghost { background: var(--panel2); color: var(--text); border: 1px solid var(--border); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .note { font-size: 11.5px; color: var(--muted); line-height: 1.5; margin-top: 8px; }
  #resinfo { font-size: 11.5px; color: var(--muted); margin-top: 6px; text-align: center; }
  #saveOverlay {
    display: none;
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,.88);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; padding: 20px;
  }
  #saveOverlay img { max-width: 92%; max-height: 68vh; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,.6); }
  #saveOverlay .tip { color: #fff; font-size: 14.5px; text-align: center; line-height: 1.6; }
  #saveOverlay button { flex: 0 0 auto; padding: 10px 28px; }
</style>
</head>
<body>
<header>
  <h1><em>Kris</em> Collage</h1>
  <span>相片拼貼 · 原畫質輸出</span>
  <span class="ver">Kris20260702_v3</span>
</header>

<div class="layout">
  <div class="stage">
    <div style="width:100%;display:flex;flex-direction:column;align-items:center">
      <canvas id="preview"></canvas>
      <div id="resinfo"></div>
    </div>
  </div>

  <div class="controls">
    <div class="card">
      <h2>版式</h2>
      <div class="row">
        <label>模式</label>
        <div class="seg" id="modeSeg">
          <button data-mode="double" class="active">Double Collages</button>
          <button data-mode="standout">People Standouts</button>
          <button data-mode="seetake">What I See</button>
          <button data-mode="single">單圖</button>
        </div>
      </div>
      <div class="row">
        <label>比例</label>
        <div class="seg" id="ratioSeg">
          <button data-ratio="1.25" class="active">4:5</button>
          <button data-ratio="1">1:1</button>
          <button data-ratio="1.3333">3:4</button>
          <button data-ratio="1.7778">9:16</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>照片</h2>
      <div class="uploads" id="uploadsGrid">
        <label class="upl" id="upl-bgTop">
          <input type="file" accept="image/*" data-slot="bgTop">
          <span class="lbl">上方照片</span><span class="hint">點擊上傳</span>
        </label>
        <label class="upl" id="upl-bgBottom">
          <input type="file" accept="image/*" data-slot="bgBottom">
          <span class="lbl">下方照片</span><span class="hint">點擊上傳</span>
        </label>
        <label class="upl" id="upl-insetSingle" style="display:none">
          <input type="file" accept="image/*" data-slot="insetSingle">
          <span class="lbl">小圖</span><span class="hint">點擊上傳</span>
        </label>
        <label class="upl" id="upl-stripLeft" style="display:none">
          <input type="file" accept="image/*" data-slot="stripLeft">
          <span class="lbl">左圖</span><span class="hint">點擊上傳</span>
        </label>
        <label class="upl" id="upl-stripMid" style="display:none">
          <input type="file" accept="image/*" data-slot="stripMid">
          <span class="lbl">中間人物</span><span class="hint">點擊上傳</span>
        </label>
        <label class="upl" id="upl-stripRight" style="display:none">
          <input type="file" accept="image/*" data-slot="stripRight">
          <span class="lbl">右圖</span><span class="hint">點擊上傳</span>
        </label>
        <label class="upl" id="upl-seeImg" style="display:none">
          <input type="file" accept="image/*" data-slot="seeImg">
          <span class="lbl">照片</span><span class="hint">點擊上傳</span>
        </label>
      </div>
      <div class="row" id="rowInsetSize" style="margin-top:10px">
        <label>小圖大小</label>
        <input type="range" id="insetSize" min="0.18" max="0.6" step="0.005" value="0.34">
      </div>
      <div class="row" id="rowAspect">
        <label>小圖長寬</label>
        <input type="range" id="insetAspect" min="0.7" max="1.5" step="0.01" value="1.15">
      </div>
      <div class="row" id="rowShadow">
        <label>小圖陰影</label>
        <input type="range" id="insetShadow" min="0" max="1" step="0.05" value="0.45">
      </div>
      <div class="row" id="rowFeather" style="display:none">
        <label>邊緣柔化</label>
        <input type="range" id="feather" min="0" max="1" step="0.05" value="0.35">
      </div>
      <div class="row" id="rowFrameColor" style="display:none">
        <label>框線顏色</label>
        <input type="color" id="frameColor" value="#ffd100" style="flex:0 0 44px;height:32px;padding:0;border:1px solid var(--border);border-radius:7px;background:var(--panel2);cursor:pointer">
        <button type="button" class="seg" id="frameYellow" style="padding:6px 10px;font-size:12px">國家地理黃</button>
      </div>
      <div class="row" id="rowFrameWidth" style="display:none">
        <label>框線粗細</label>
        <input type="range" id="frameWidth" min="0.003" max="0.02" step="0.001" value="0.008">
      </div>
      <div class="note" id="photoNote"></div>
    </div>

    <div class="card">
      <h2>文字</h2>
      <div id="textGroupDefault">
        <div class="row"><label>日文小標</label><input type="text" id="txtSub" value="秋色に包まれた"></div>
        <div class="row"><label>主標題</label><input type="text" id="txtTitle" value="Japan Gold Film"></div>
        <div class="row"><label>下標籤</label><input type="text" id="txtLabel" value="JAPAN VOL.2"></div>
        <div class="row"><label>標題大小</label><input type="range" id="titleSize" min="0.04" max="0.13" step="0.002" value="0.078"></div>
        <div class="row"><label>文字位置</label><input type="range" id="textY" min="0.1" max="0.92" step="0.005" value="0.49"></div>
      </div>
      <div id="textGroupSee" style="display:none">
        <div class="row"><label>上方文字</label><input type="text" id="txtSee" value="What I see ..."></div>
        <div class="row"><label>下方文字</label><input type="text" id="txtTake" value="What I take"></div>
        <div class="row"><label>文字大小</label><input type="range" id="seeSize" min="0.03" max="0.09" step="0.002" value="0.055"></div>
      </div>
      <div class="note">留空即可隱藏該行文字。</div>
    </div>

    <div class="card">
      <h2>輸出</h2>
      <div class="btns">
        <button class="btn primary" id="dlJpg" disabled>儲存 JPEG</button>
        <button class="btn ghost" id="dlPng" disabled>儲存 PNG（無損）</button>
      </div>
      <div class="note">輸出解析度以背景原圖的像素為準，畫質不打折。手機上會開啟分享面板，選「儲存影像」即可直接存進相簿；電腦上則直接下載檔案。</div>
    </div>
  </div>
</div>

<div id="saveOverlay">
  <img id="saveImg" alt="collage">
  <div class="tip">長按上方圖片 → 「加入照片」即可儲存到相簿</div>
  <button class="btn ghost" id="saveClose">關閉</button>
</div>

<script>
(function () {
  'use strict';

  const state = {
    mode: 'double',           // 'double' | 'standout' | 'single'
    ratio: 1.25,              // height / width
    insetScale: 0.34,
    insetAspect: 1.15,
    insetShadow: 0.45,
    feather: 0.35,            // person cutout edge softness (standout)
    frameColor: '#ffd100',    // National Geographic yellow (seetake)
    frameWidth: 0.008,        // stroke width as fraction of canvas width
    frame: { x0: 0.34, y0: 0.30, x1: 0.66, y1: 0.72 }, // fractions of W (x) / H (y)
    text: {
      sub: '秋色に包まれた', title: 'Japan Gold Film', label: 'JAPAN VOL.2', y: 0.49, titleSize: 0.078,
      see: 'What I see ...', take: 'What I take', seeSize: 0.055,
    },
    slots: {
      bgTop:       { img: null, panX: 0.5, panY: 0.5 },
      bgBottom:    { img: null, panX: 0.5, panY: 0.5 },
      stripLeft:   { img: null, panX: 0.5, panY: 0.5 },
      stripMid:    { img: null, panX: 0.5, panY: 0.5 },
      stripRight:  { img: null, panX: 0.5, panY: 0.5 },
      seeImg:      { img: null, panX: 0.5, panY: 0.5 },
      insetTop:    { cx: 0.5, cy: 0.28 },
      insetBottom: { cx: 0.5, cy: 0.72 },
      insetSingle: { img: null, cx: 0.5, cy: 0.40 },
    },
  };

  const preview = document.getElementById('preview');
  const resinfo = document.getElementById('resinfo');

  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)
    || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  function activeBgSlots() {
    if (state.mode === 'double') return ['bgTop', 'bgBottom'];
    if (state.mode === 'standout') return ['stripLeft', 'stripMid', 'stripRight'];
    if (state.mode === 'seetake') return ['seeImg'];
    return ['bgTop'];
  }
  function activeInsetSlots() {
    if (state.mode === 'double') return ['insetTop', 'insetBottom'];
    if (state.mode === 'standout' || state.mode === 'seetake') return [];
    return ['insetSingle'];
  }

  // rect of a background slot as fractions of the canvas
  function bgRect(slot) {
    if (state.mode === 'standout') {
      const i = { stripLeft: 0, stripMid: 1, stripRight: 2 }[slot];
      return { x: i / 3, y: 0, w: 1 / 3, h: 1 };
    }
    if (state.mode === 'single' || state.mode === 'seetake') return { x: 0, y: 0, w: 1, h: 1 };
    return slot === 'bgTop'
      ? { x: 0, y: 0,   w: 1, h: 0.5 }
      : { x: 0, y: 0.5, w: 1, h: 0.5 };
  }

  // pixel rect of a bg slot on a W x H canvas, rounded so adjacent boxes tile without seams
  function bgRectPx(slot, W, H) {
    const r = bgRect(slot);
    const x0 = Math.round(r.x * W), y0 = Math.round(r.y * H);
    const x1 = Math.round((r.x + r.w) * W), y1 = Math.round((r.y + r.h) * H);
    return { x: x0, y: y0, w: x1 - x0, h: y1 - y0 };
  }

  // display rect (px) of an inset on a W x H canvas
  function insetRect(slot, W, H) {
    const s = state.slots[slot];
    let iw = W * state.insetScale, ih;
    if (slot === 'insetSingle') {
      if (!s.img) return null;
      ih = iw * s.img.naturalHeight / s.img.naturalWidth;
    } else {
      ih = iw * state.insetAspect;
    }
    return { x: s.cx * W - iw / 2, y: s.cy * H - ih / 2, w: iw, h: ih };
  }

  // source crop for cover-fit of img into a dw x dh box (px), honoring pan
  function coverCrop(img, dw, dh, panX, panY) {
    const scale = Math.max(dw / img.naturalWidth, dh / img.naturalHeight);
    const cw = dw / scale, ch = dh / scale;
    return {
      sx: (img.naturalWidth - cw) * panX,
      sy: (img.naturalHeight - ch) * panY,
      sw: cw, sh: ch, scale,
    };
  }

  // high-quality drawImage: iterative half-scaling when shrinking a lot
  function drawImageHQ(ctx, img, sx, sy, sw, sh, dx, dy, dw, dh) {
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    if (dw >= sw * 0.5) {
      ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
      return;
    }
    let cur = img, cx = sx, cy = sy, cw = sw, ch = sh;
    while (cw * 0.5 > dw) {
      const c = document.createElement('canvas');
      c.width = Math.max(1, Math.round(cw / 2));
      c.height = Math.max(1, Math.round(ch / 2));
      const cc = c.getContext('2d');
      cc.imageSmoothingEnabled = true;
      cc.imageSmoothingQuality = 'high';
      cc.drawImage(cur, cx, cy, cw, ch, 0, 0, c.width, c.height);
      cur = c; cx = 0; cy = 0; cw = c.width; ch = c.height;
    }
    ctx.drawImage(cur, cx, cy, cw, ch, dx, dy, dw, dh);
  }

  // drawImageHQ with the source rect clamped to the image bounds
  function drawWindow(ctx, img, sx, sy, sw, sh, dx, dy, dw, dh) {
    const kx = dw / sw, ky = dh / sh;
    const nsx = Math.max(0, sx), nsy = Math.max(0, sy);
    const nex = Math.min(img.naturalWidth, sx + sw), ney = Math.min(img.naturalHeight, sy + sh);
    if (nex <= nsx || ney <= nsy) return;
    drawImageHQ(ctx, img, nsx, nsy, nex - nsx, ney - nsy,
      dx + (nsx - sx) * kx, dy + (nsy - sy) * ky, (nex - nsx) * kx, (ney - nsy) * ky);
  }

  // centered text with manual letter-spacing
  function drawSpacedText(ctx, text, cxPx, yPx, spacingPx) {
    const chars = [...text];
    let total = 0;
    const widths = chars.map(c => { const w = ctx.measureText(c).width; total += w; return w; });
    total += spacingPx * Math.max(0, chars.length - 1);
    let x = cxPx - total / 2;
    const prevAlign = ctx.textAlign;
    ctx.textAlign = 'left';
    chars.forEach((c, i) => { ctx.fillText(c, x, yPx); x += widths[i] + spacingPx; });
    ctx.textAlign = prevAlign;
  }

  // ---------- person segmentation (People Standouts) ----------

  let segmenterPromise = null;
  let segError = false;
  function getSegmenter() {
    if (!segmenterPromise) {
      segmenterPromise = (async () => {
        const v = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/vision_bundle.mjs');
        const fs = await v.FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/wasm');
        return v.ImageSegmenter.createFromOptions(fs, {
          baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite' },
          runningMode: 'IMAGE',
          outputConfidenceMasks: true,
        });
      })();
    }
    return segmenterPromise;
  }

  const segStore = new WeakMap(); // img -> { pending?, failed?, maskCanvas?, cutout?, cutoutFeather? }

  async function segmentPerson(img) {
    const entry = { pending: true };
    segStore.set(img, entry);
    updateResInfo();
    try {
      const seg = await getSegmenter();
      const s = Math.min(1, 1280 / Math.max(img.naturalWidth, img.naturalHeight));
      const c = document.createElement('canvas');
      c.width = Math.max(1, Math.round(img.naturalWidth * s));
      c.height = Math.max(1, Math.round(img.naturalHeight * s));
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      const res = seg.segment(c);
      const masks = res.confidenceMasks;
      const m = masks.length > 1 ? masks[1] : masks[0];
      const mw = m.width, mh = m.height;
      const data = m.getAsFloat32Array();
      const md = new ImageData(mw, mh);
      for (let i = 0; i < mw * mh; i++) {
        const a = Math.max(0, Math.min(255, Math.round(data[i] * 255)));
        md.data[i * 4] = 255; md.data[i * 4 + 1] = 255; md.data[i * 4 + 2] = 255;
        md.data[i * 4 + 3] = a;
      }
      masks.forEach(mm => mm.close());
      const maskCanvas = document.createElement('canvas');
      maskCanvas.width = mw; maskCanvas.height = mh;
      maskCanvas.getContext('2d').putImageData(md, 0, 0);
      segStore.set(img, { maskCanvas });
    } catch (e) {
      segError = true;
      segStore.set(img, { failed: true });
    }
    updateResInfo();
    schedule();
  }

  // full-resolution person cutout, cached per image + feather setting
  function getCutout(img) {
    const e = segStore.get(img);
    if (!e) { segmentPerson(img); return null; }
    if (e.pending || e.failed || !e.maskCanvas) return null;
    if (!e.cutout || e.cutoutFeather !== state.feather) {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      const x = c.getContext('2d');
      x.drawImage(img, 0, 0);
      x.globalCompositeOperation = 'destination-in';
      x.imageSmoothingEnabled = true;
      x.imageSmoothingQuality = 'high';
      const blurPx = state.feather * img.naturalWidth * 0.004;
      try { x.filter = blurPx > 0.5 ? `blur(${blurPx.toFixed(1)}px)` : 'none'; } catch (err) {}
      x.drawImage(e.maskCanvas, 0, 0, c.width, c.height);
      try { x.filter = 'none'; } catch (err) {}
      e.cutout = c;
      e.cutoutFeather = state.feather;
    }
    return e.cutout;
  }

  // ---------- rendering ----------

  function render(canvas, W, opts) {
    opts = opts || {};
    const H = Math.round(W * state.ratio);
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);

    const placeholderText = {
      bgTop: state.mode === 'double' ? '↑ 上傳上方照片' : '↑ 上傳背景照片',
      bgBottom: '↓ 上傳下方照片',
      stripLeft: '左圖', stripMid: '中間人物', stripRight: '右圖',
      seeImg: '↑ 上傳照片',
    };

    // backgrounds
    for (const slot of activeBgSlots()) {
      const s = state.slots[slot];
      const r = bgRectPx(slot, W, H);
      if (s.img) {
        const c = coverCrop(s.img, r.w, r.h, s.panX, s.panY);
        drawImageHQ(ctx, s.img, c.sx, c.sy, c.sw, c.sh, r.x, r.y, r.w, r.h);
      } else {
        ctx.fillStyle = ['bgTop', 'stripLeft', 'stripRight'].includes(slot) ? '#26262e' : '#1d1d24';
        ctx.fillRect(r.x, r.y, r.w, r.h);
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.font = `${Math.round(W * 0.026)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(placeholderText[slot] || '上傳照片', r.x + r.w / 2, r.y + r.h / 2);
      }
    }

    // person standout overlay: cutout of the middle photo drawn with the same
    // cover transform as its strip, but NOT clipped — so the person spills
    // over the left/right strips
    if (state.mode === 'standout') {
      const s = state.slots.stripMid;
      if (s.img) {
        const r = bgRectPx('stripMid', W, H);
        const c = coverCrop(s.img, r.w, r.h, s.panX, s.panY);
        const cutout = getCutout(s.img);
        if (cutout) {
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = 'high';
          ctx.drawImage(cutout,
            r.x - c.sx * c.scale, r.y - c.sy * c.scale,
            s.img.naturalWidth * c.scale, s.img.naturalHeight * c.scale);
        }
      }
    }

    // insets
    function insetShadowRect(rd) {
      if (state.insetShadow <= 0) return;
      ctx.save();
      ctx.shadowColor = `rgba(0,0,0,${0.55 * state.insetShadow})`;
      ctx.shadowBlur = W * 0.03 * state.insetShadow;
      ctx.shadowOffsetY = W * 0.006 * state.insetShadow;
      ctx.fillStyle = '#000';
      ctx.fillRect(rd.x, rd.y, rd.w, rd.h);
      ctx.restore();
    }

    if (state.mode === 'double') {
      const pairs = [
        { show: 'insetTop',    hiddenBy: 'insetBottom', srcBg: 'bgBottom' },
        { show: 'insetBottom', hiddenBy: 'insetTop',    srcBg: 'bgTop' },
      ];
      for (const p of pairs) {
        const bgS = state.slots[p.srcBg];
        if (!bgS.img) continue;
        const rd = insetRect(p.show, W, H);
        const rs = insetRect(p.hiddenBy, W, H);
        insetShadowRect(rd);
        const box = bgRectPx(p.srcBg, W, H);
        const c = coverCrop(bgS.img, box.w, box.h, bgS.panX, bgS.panY);
        drawWindow(ctx, bgS.img,
          c.sx + (rs.x - box.x) / c.scale, c.sy + (rs.y - box.y) / c.scale,
          rd.w / c.scale, rd.h / c.scale,
          rd.x, rd.y, rd.w, rd.h);
      }
    } else if (state.mode === 'single') {
      const s = state.slots.insetSingle;
      if (s.img) {
        const rd = insetRect('insetSingle', W, H);
        insetShadowRect(rd);
        drawImageHQ(ctx, s.img, 0, 0, s.img.naturalWidth, s.img.naturalHeight, rd.x, rd.y, rd.w, rd.h);
      }
    }

    // What I See / What I Take: draggable frame + labels
    if (state.mode === 'seetake') {
      const f = state.frame;
      const fx = f.x0 * W, fy = f.y0 * H, fw = (f.x1 - f.x0) * W, fh = (f.y1 - f.y0) * H;
      // labels
      const tt = state.text;
      const sz = W * state.text.seeSize;
      ctx.save();
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = 'rgba(0,0,0,0.55)';
      ctx.shadowBlur = W * 0.01;
      ctx.shadowOffsetY = W * 0.002;
      if (tt.see) {
        ctx.font = `700 ${sz}px "Montserrat", sans-serif`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(tt.see, W * 0.055, H * 0.045);
      }
      if (tt.take) {
        ctx.font = `700 ${sz}px "Montserrat", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(tt.take, W / 2, fy + fh + W * 0.03);
      }
      ctx.restore();
      // frame
      ctx.save();
      ctx.strokeStyle = state.frameColor;
      ctx.lineWidth = Math.max(1, W * state.frameWidth);
      ctx.lineJoin = 'miter';
      ctx.shadowColor = 'rgba(0,0,0,0.35)';
      ctx.shadowBlur = W * 0.006;
      ctx.strokeRect(fx, fy, fw, fh);
      ctx.restore();
      // corner handles (preview only)
      if (opts.handles) {
        const hs = Math.max(8, W * 0.018);
        ctx.fillStyle = '#ffffff';
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = Math.max(1, W * 0.002);
        for (const [hx, hy] of [[fx, fy], [fx + fw, fy], [fx + fw, fy + fh], [fx, fy + fh]]) {
          ctx.beginPath();
          ctx.rect(hx - hs / 2, hy - hs / 2, hs, hs);
          ctx.fill();
          ctx.stroke();
        }
      }
    }

    // text block
    const t = state.text;
    if (state.mode !== 'seetake' && (t.sub || t.title || t.label)) {
      const cx = W / 2;
      const baseY = t.y * H;
      const titlePx = W * t.titleSize;
      ctx.save();
      ctx.fillStyle = '#ffffff';
      ctx.textBaseline = 'alphabetic';
      ctx.shadowColor = 'rgba(0,0,0,0.45)';
      ctx.shadowBlur = W * 0.008;
      ctx.shadowOffsetY = W * 0.001;
      if (t.sub) {
        const px = W * 0.021;
        ctx.font = `500 ${px}px "Noto Serif JP", serif`;
        drawSpacedText(ctx, t.sub, cx, baseY - titlePx * 0.72, px * 0.38);
      }
      if (t.title) {
        ctx.font = `italic 500 ${titlePx}px "Playfair Display", serif`;
        ctx.textAlign = 'center';
        ctx.fillText(t.title, cx, baseY + titlePx * 0.28);
      }
      if (t.label) {
        const px = W * 0.0165;
        ctx.font = `600 ${px}px "Montserrat", sans-serif`;
        drawSpacedText(ctx, t.label.toUpperCase(), cx, baseY + titlePx * 0.72, px * 0.45);
      }
      ctx.restore();
    }
  }

  function previewRenderWidth() {
    const cssW = preview.clientWidth || 720;
    return Math.min(1080, Math.max(540, Math.round(cssW * (window.devicePixelRatio || 1))));
  }

  let raf = null;
  function schedule() {
    if (raf) return;
    raf = requestAnimationFrame(() => {
      raf = null;
      render(preview, previewRenderWidth(), { handles: true });
      updateResInfo();
    });
  }

  // canvas width at which every used background maps 1:1 (or better) to source pixels
  function exportWidth() {
    let maxW = 0;
    for (const slot of activeBgSlots()) {
      const img = state.slots[slot].img;
      if (!img) continue;
      const r = bgRect(slot);
      const boxAspect = r.w / (r.h * state.ratio);
      const imgAspect = img.naturalWidth / img.naturalHeight;
      const w = imgAspect > boxAspect
        ? img.naturalHeight / (r.h * state.ratio)
        : img.naturalWidth / r.w;
      maxW = Math.max(maxW, w);
    }
    if (!maxW) maxW = 2160;
    return Math.min(6400, Math.round(maxW));
  }

  function updateResInfo() {
    const hasBg = activeBgSlots().some(s => state.slots[s].img);
    const w = exportWidth();
    const h = Math.round(w * state.ratio);
    let txt = hasBg ? `輸出尺寸：${w} × ${h} px` : '尚未上傳照片';
    if (state.mode === 'standout') {
      const mid = state.slots.stripMid.img;
      if (mid) {
        const e = segStore.get(mid);
        if (!e || e.pending) txt += '（人物偵測中…）';
        else if (e.failed) txt += '（人物偵測失敗，僅顯示三格拼貼）';
      }
    }
    resinfo.textContent = txt;
    document.getElementById('dlJpg').disabled = !hasBg;
    document.getElementById('dlPng').disabled = !hasBg;
  }

  // ---------- export & save ----------

  function makeExportCanvas() {
    let W = exportWidth();
    for (let i = 0; i < 12; i++) {
      const H = Math.round(W * state.ratio);
      const c = document.createElement('canvas');
      c.width = W; c.height = H;
      const x = c.getContext('2d');
      let ok = false;
      if (x) {
        try {
          x.fillStyle = '#123456';
          x.fillRect(W - 1, H - 1, 1, 1);
          ok = x.getImageData(W - 1, H - 1, 1, 1).data[3] !== 0;
        } catch (e) { ok = false; }
      }
      if (ok || W <= 1200) {
        render(c, W);
        return c;
      }
      W = Math.floor(W * 0.85);
    }
    return null;
  }

  const overlay = document.getElementById('saveOverlay');
  const saveImg = document.getElementById('saveImg');
  document.getElementById('saveClose').addEventListener('click', () => {
    overlay.style.display = 'none';
    if (saveImg.src) { URL.revokeObjectURL(saveImg.src); saveImg.removeAttribute('src'); }
  });

  async function download(type) {
    const c = makeExportCanvas();
    if (!c) { alert('這台裝置記憶體不足，無法輸出，請換較小的照片試試'); return; }
    const blob = await new Promise(res => c.toBlob(res, type, 0.97));
    if (!blob) { alert('輸出失敗，請再試一次'); return; }
    const filename = `kris_collage_${Date.now()}.${type === 'image/png' ? 'png' : 'jpg'}`;

    if (isMobile && navigator.canShare) {
      const file = new File([blob], filename, { type: blob.type });
      if (navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file] }); return; }
        catch (e) { if (e && e.name === 'AbortError') return; }
      }
      saveImg.src = URL.createObjectURL(blob);
      overlay.style.display = 'flex';
      return;
    }

    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }
  document.getElementById('dlJpg').addEventListener('click', () => download('image/jpeg'));
  document.getElementById('dlPng').addEventListener('click', () => download('image/png'));

  // ---------- uploads ----------

  function setImage(slot, img, thumbUrl) {
    state.slots[slot].img = img;
    const upl = document.getElementById('upl-' + slot);
    if (upl) {
      upl.classList.add('filled');
      let th = upl.querySelector('img.thumb');
      if (!th) { th = document.createElement('img'); th.className = 'thumb'; upl.prepend(th); }
      th.src = thumbUrl;
      upl.querySelector('.hint').textContent = `${img.naturalWidth}×${img.naturalHeight}`;
    }
    if (slot === 'stripMid') segmentPerson(img);
    schedule();
  }
  window._setImage = setImage; // exposed for automated testing

  document.querySelectorAll('.upl input[type=file]').forEach(inp => {
    inp.addEventListener('change', () => {
      const file = inp.files && inp.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => setImage(inp.dataset.slot, img, url);
      img.src = url;
    });
  });

  // ---------- controls ----------

  function applyModeUI() {
    const m = state.mode;
    const show = (id, on) => document.getElementById(id).style.display = on ? '' : 'none';
    show('upl-bgTop', m !== 'standout' && m !== 'seetake');
    show('upl-bgBottom', m === 'double');
    show('upl-insetSingle', m === 'single');
    show('upl-stripLeft', m === 'standout');
    show('upl-stripMid', m === 'standout');
    show('upl-stripRight', m === 'standout');
    show('upl-seeImg', m === 'seetake');
    show('rowInsetSize', m !== 'standout' && m !== 'seetake');
    show('rowAspect', m === 'double');
    show('rowShadow', m !== 'standout' && m !== 'seetake');
    show('rowFeather', m === 'standout');
    show('rowFrameColor', m === 'seetake');
    show('rowFrameWidth', m === 'seetake');
    show('textGroupDefault', m !== 'seetake');
    show('textGroupSee', m === 'seetake');
    document.getElementById('uploadsGrid').classList.toggle('three', m === 'standout');
    document.querySelector('#upl-bgTop .lbl').textContent = m === 'double' ? '上方照片' : '背景照片';
    document.getElementById('photoNote').innerHTML = {
      double: 'Double Collages：只需上傳兩張照片，上方小圖自動顯示「下方照片被小圖遮住的部分」，下方小圖則顯示「上方照片被遮住的部分」——每張小圖搭配另一半的大圖，都能拼回完整原照。直接在預覽圖上<b>拖曳</b>：拖小圖移動位置，拖背景調整取景。',
      standout: 'People Standouts：三張直圖並排，中間照片的人物會自動去背、跳出直條疊在左右兩張圖上。人物偵測在你的裝置上進行，照片不會上傳。直接在預覽圖上<b>拖曳</b>任一格調整取景。',
      seetake: 'What I See / What I Take：上傳一張照片，用手<b>拖曳黃色框</b>移動位置、拉<b>四角</b>縮放，框住你想「拍下」的部分。框外拖曳可調整照片取景。框線預設國家地理黃，可自訂顏色。',
      single: '單圖模式：一張背景照片加一張自選小圖。直接在預覽圖上<b>拖曳</b>：拖小圖移動位置，拖背景調整取景。',
    }[m];
  }

  function segWire(id, apply) {
    const seg = document.getElementById(id);
    seg.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
      seg.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      apply(b.dataset);
      schedule();
    }));
  }
  segWire('modeSeg', d => { state.mode = d.mode; applyModeUI(); });
  segWire('ratioSeg', d => { state.ratio = parseFloat(d.ratio); });

  const wire = (id, fn) => document.getElementById(id).addEventListener('input', e => { fn(e.target.value); schedule(); });
  wire('insetSize', v => state.insetScale = parseFloat(v));
  wire('insetAspect', v => state.insetAspect = parseFloat(v));
  wire('insetShadow', v => state.insetShadow = parseFloat(v));
  wire('feather', v => state.feather = parseFloat(v));
  wire('frameColor', v => state.frameColor = v);
  wire('frameWidth', v => state.frameWidth = parseFloat(v));
  wire('txtSee', v => state.text.see = v);
  wire('txtTake', v => state.text.take = v);
  wire('seeSize', v => state.text.seeSize = parseFloat(v));
  document.getElementById('frameYellow').addEventListener('click', () => {
    state.frameColor = '#ffd100';
    document.getElementById('frameColor').value = '#ffd100';
    schedule();
  });
  wire('txtSub', v => state.text.sub = v);
  wire('txtTitle', v => state.text.title = v);
  wire('txtLabel', v => state.text.label = v);
  wire('titleSize', v => state.text.titleSize = parseFloat(v));
  wire('textY', v => state.text.y = parseFloat(v));

  // ---------- drag interactions on preview ----------

  let drag = null;

  function pointerFrac(e) {
    const r = preview.getBoundingClientRect();
    return {
      fx: (e.clientX - r.left) / r.width,
      fy: (e.clientY - r.top) / r.height,
    };
  }

  function hitInset(p) {
    const r = preview.getBoundingClientRect();
    const slots = activeInsetSlots().slice().reverse();
    for (const slot of slots) {
      const rd = insetRect(slot, r.width, r.height);
      if (!rd) continue;
      const px = p.fx * r.width, py = p.fy * r.height;
      if (px >= rd.x && px <= rd.x + rd.w && py >= rd.y && py <= rd.y + rd.h) return slot;
    }
    return null;
  }

  // returns { kind:'frameResize', corner } | { kind:'frameMove' } | null
  function hitFrame(p) {
    const rect = preview.getBoundingClientRect();
    const f = state.frame;
    const px = p.fx * rect.width, py = p.fy * rect.height;
    const corners = [[f.x0, f.y0], [f.x1, f.y0], [f.x1, f.y1], [f.x0, f.y1]];
    const rad = Math.max(16, rect.width * 0.035);
    for (let i = 0; i < 4; i++) {
      const cx = corners[i][0] * rect.width, cy = corners[i][1] * rect.height;
      if (Math.abs(px - cx) <= rad && Math.abs(py - cy) <= rad) return { kind: 'frameResize', corner: i };
    }
    if (p.fx > f.x0 && p.fx < f.x1 && p.fy > f.y0 && p.fy < f.y1) return { kind: 'frameMove' };
    return null;
  }

  function hitBg(p) {
    if (state.mode === 'seetake') return state.slots.seeImg.img ? 'seeImg' : null;
    if (state.mode === 'standout') {
      const slot = ['stripLeft', 'stripMid', 'stripRight'][Math.min(2, Math.floor(p.fx * 3))];
      return state.slots[slot].img ? slot : null;
    }
    if (state.mode === 'single') return state.slots.bgTop.img ? 'bgTop' : null;
    const slot = p.fy < 0.5 ? 'bgTop' : 'bgBottom';
    return state.slots[slot].img ? slot : null;
  }

  preview.addEventListener('pointerdown', e => {
    e.preventDefault();
    const p = pointerFrac(e);
    if (state.mode === 'seetake') {
      const fh = hitFrame(p);
      if (fh) {
        drag = Object.assign({}, fh, { lastFx: p.fx, lastFy: p.fy });
      } else {
        const bg = hitBg(p);
        if (bg) drag = { kind: 'bg', slot: bg, lastX: e.clientX, lastY: e.clientY };
      }
      if (drag) preview.setPointerCapture(e.pointerId);
      return;
    }
    const inset = hitInset(p);
    if (inset) {
      drag = { kind: 'inset', slot: inset, lastFx: p.fx, lastFy: p.fy };
    } else {
      const bg = hitBg(p);
      if (bg) drag = { kind: 'bg', slot: bg, lastX: e.clientX, lastY: e.clientY };
    }
    if (drag) preview.setPointerCapture(e.pointerId);
  });

  preview.addEventListener('pointermove', e => {
    if (!drag) return;
    if (drag.kind === 'frameMove' || drag.kind === 'frameResize') {
      const p = pointerFrac(e);
      const f = state.frame;
      const MIN = 0.06;
      if (drag.kind === 'frameMove') {
        let dfx = p.fx - drag.lastFx, dfy = p.fy - drag.lastFy;
        dfx = Math.min(1 - f.x1, Math.max(-f.x0, dfx));
        dfy = Math.min(1 - f.y1, Math.max(-f.y0, dfy));
        f.x0 += dfx; f.x1 += dfx; f.y0 += dfy; f.y1 += dfy;
      } else {
        const cx = Math.min(1, Math.max(0, p.fx));
        const cy = Math.min(1, Math.max(0, p.fy));
        // corner: 0=TL 1=TR 2=BR 3=BL
        if (drag.corner === 0) { f.x0 = Math.min(cx, f.x1 - MIN); f.y0 = Math.min(cy, f.y1 - MIN); }
        else if (drag.corner === 1) { f.x1 = Math.max(cx, f.x0 + MIN); f.y0 = Math.min(cy, f.y1 - MIN); }
        else if (drag.corner === 2) { f.x1 = Math.max(cx, f.x0 + MIN); f.y1 = Math.max(cy, f.y0 + MIN); }
        else { f.x0 = Math.min(cx, f.x1 - MIN); f.y1 = Math.max(cy, f.y0 + MIN); }
      }
      drag.lastFx = p.fx; drag.lastFy = p.fy;
      schedule();
      return;
    }
    if (drag.kind === 'inset') {
      const p = pointerFrac(e);
      const s = state.slots[drag.slot];
      s.cx = Math.min(0.98, Math.max(0.02, s.cx + (p.fx - drag.lastFx)));
      s.cy = Math.min(0.98, Math.max(0.02, s.cy + (p.fy - drag.lastFy)));
      drag.lastFx = p.fx; drag.lastFy = p.fy;
    } else {
      const s = state.slots[drag.slot];
      const img = s.img;
      const rect = preview.getBoundingClientRect();
      const box = bgRectPx(drag.slot, rect.width, rect.height);
      const c = coverCrop(img, box.w, box.h, s.panX, s.panY);
      const dxSrc = (e.clientX - drag.lastX) / c.scale;
      const dySrc = (e.clientY - drag.lastY) / c.scale;
      const slackX = img.naturalWidth - c.sw;
      const slackY = img.naturalHeight - c.sh;
      if (slackX > 1) s.panX = Math.min(1, Math.max(0, s.panX - dxSrc / slackX));
      if (slackY > 1) s.panY = Math.min(1, Math.max(0, s.panY - dySrc / slackY));
      drag.lastX = e.clientX; drag.lastY = e.clientY;
    }
    schedule();
  });

  const endDrag = () => { drag = null; };
  preview.addEventListener('pointerup', endDrag);
  preview.addEventListener('pointercancel', endDrag);

  // ---------- init ----------

  window.addEventListener('resize', schedule);

  applyModeUI();
  schedule();
  if (document.fonts && document.fonts.ready) {
    Promise.all([
      document.fonts.load('italic 500 64px "Playfair Display"'),
      document.fonts.load('500 20px "Noto Serif JP"', '秋色に包まれた'),
      document.fonts.load('600 16px "Montserrat"'),
    ]).then(schedule).catch(() => {});
    document.fonts.ready.then(schedule);
  }
})();
</script>
</body>
</html>
